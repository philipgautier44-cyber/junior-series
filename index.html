  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e correspond à ce filtre pour le moment.<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- étape pas encore jouée (lecture seule) -->\n      <sc-if value=\"{{ viewEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FAF8F3; border-radius:22px 22px 0 0; margin-top:18px; min-height:440px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 34px;\">\n        <div style=\"width:74px; height:74px; border-radius:22px; background:#EAF4EE; display:flex; align-items:center; justify-content:center; font-size:32px; margin-bottom:18px;\">🗓️<\u002Fdiv>\n        <div style=\"font-family:'Archivo'; font-weight:800; font-size:19px;\">Étape à venir<\u002Fdiv>\n        <div style=\"font-size:13.5px; color:#7A847C; margin-top:7px; line-height:1.5; max-width:250px;\">Le classement sera disponible ici dès que cette étape aura été jouée. À très vite sur le parcours&nbsp;! 🏌️<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n    <!-- footer info (lecture seule) -->\n    <sc-if value=\"{{ showNext }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"flex:none; padding:14px 18px calc(16px + env(safe-area-inset-bottom)); background:#fff; border-top:1px solid #EEEAE0; display:flex; align-items:center; gap:11px;\">\n      <span style=\"width:38px; height:38px; flex:none; border-radius:11px; background:#EAF4EE; display:flex; align-items:center; justify-content:center; font-size:18px;\">🗓️<\u002Fspan>\n      <div style=\"flex:1; min-width:0;\">\n        <div style=\"font-size:10px; font-weight:700; letter-spacing:.06em; color:#9AA39B;\">PROCHAINE ÉTAPE<\u002Fdiv>\n        <div style=\"font-size:13.5px; font-weight:700; color:#1F2A24; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ nextName }}<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-size:12.5px; font-weight:700; color:#1E6B45; flex:none;\">{{ nextDate }}<\u002Fspan>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:520,&quot;height&quot;:900},&quot;showIndex&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;categoryFilter&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Toutes&quot;,&quot;options&quot;:[&quot;Toutes&quot;,&quot;U10&quot;,&quot;U12&quot;,&quot;U14&quot;,&quot;U16&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'general',\n    gender: 'F',\n    stages: [\n      { id: 'e1', name: 'Étape 1 — Les Saules', date: '15 mars 2026', n: 1, published: true, results: [\n        { name: 'Léa Moreau', cat: 'U12', index: '28.4', points: 30 },\n        { name: 'Hugo Bernard', cat: 'U14', index: '21.2', points: 28 },\n        { name: 'Jade Lefèvre', cat: 'U12', index: '30.1', points: 25 },\n        { name: 'Tom Garnier', cat: 'U16', index: '15.7', points: 22 },\n        { name: 'Chloé Petit', cat: 'U10', index: '36.0', points: 20 },\n        { name: 'Nathan Roux', cat: 'U14', index: '24.5', points: 18 },\n        { name: 'Manon Girard', cat: 'U16', index: '18.9', points: 15 },\n        { name: 'Louis Faure', cat: 'U10', index: '38.2', points: 12 }\n      ]},\n      { id: 'e2', name: 'Étape 2 — Le Vallon', date: '12 avril 2026', n: 2, published: true, results: [\n        { name: 'Hugo Bernard', cat: 'U14', index: '21.2', points: 30 },\n        { name: 'Léa Moreau', cat: 'U12', index: '28.4', points: 27 },\n        { name: 'Tom Garnier', cat: 'U16', index: '15.7', points: 26 },\n        { name: 'Jade Lefèvre', cat: 'U12', index: '30.1', points: 24 },\n        { name: 'Nathan Roux', cat: 'U14', index: '24.5', points: 21 },\n        { name: 'Chloé Petit', cat: 'U10', index: '36.0', points: 19 },\n        { name: 'Louis Faure', cat: 'U10', index: '38.2', points: 16 },\n        { name: 'Manon Girard', cat: 'U16', index: '18.9', points: 14 }\n      ]},\n      { id: 'e3', name: 'Étape 3 — La Forêt', date: '17 mai 2026', n: 3, published: true, results: [\n        { name: 'Léa Moreau', cat: 'U12', index: '28.4', points: 32 },\n        { name: 'Jade Lefèvre', cat: 'U12', index: '30.1', points: 28 },\n        { name: 'Hugo Bernard', cat: 'U14', index: '21.2', points: 26 },\n        { name: 'Chloé Petit', cat: 'U10', index: '36.0', points: 24 },\n        { name: 'Tom Garnier', cat: 'U16', index: '15.7', points: 22 },\n        { name: 'Manon Girard', cat: 'U16', index: '18.9', points: 20 },\n        { name: 'Nathan Roux', cat: 'U14', index: '24.5', points: 18 },\n        { name: 'Louis Faure', cat: 'U10', index: '38.2', points: 15 }\n      ]},\n      { id: 'e4', name: 'Étape 4 — Le Drive', date: '14 juin 2026', n: 4, published: false, results: [] }\n    ]\n  };\n\n  catColor(c) { return { U10: '#F4724E', U12: '#4C7DF0', U14: '#2FB573', U16: '#8B5CF6' }[c] || '#9AA39B'; }\n  sexe(r) {\n    if (r && r.sexe) return r.sexe;\n    const m = { 'Léa Moreau': 'F', 'Jade Lefèvre': 'F', 'Chloé Petit': 'F', 'Manon Girard': 'F',\n                'Hugo Bernard': 'G', 'Tom Garnier': 'G', 'Nathan Roux': 'G', 'Louis Faure': 'G' };\n    return m[r && r.name] || 'G';\n  }\n  initials(n) { return (n || '').trim().split(/\\s+/).map(p => p[0] || '').slice(0, 2).join('').toUpperCase() || '?'; }\n\n  renderVals() {\n    const s = this.state;\n    const showIndex = this.props.showIndex ?? true;\n    const filter = this.props.categoryFilter ?? 'Toutes';\n    const published = s.stages.filter(x => x.published);\n\n    const buildGeneral = (stages) => {\n      const map = {};\n      stages.forEach(st => st.results.forEach(r => {\n        if (!map[r.name]) map[r.name] = { name: r.name, cat: r.cat, index: r.index, sexe: this.sexe(r), scores: [] };\n        map[r.name].scores.push(Number(r.points) || 0);\n      }));\n      return Object.values(map).map(p => ({\n        name: p.name, cat: p.cat, index: p.index, sexe: p.sexe,\n        points: [...p.scores].sort((a, b) => b - a).slice(0, 3).reduce((sum, n) => sum + n, 0)\n      })).sort((a, b) => b.points - a.points);\n    };\n    const applyFilters = (arr) => {\n      let r = arr.filter(x => this.sexe(x) === s.gender);\n      if (filter !== 'Toutes') r = r.filter(x => x.cat === filter);\n      return r;\n    };\n\n    let base, viewTitle, viewSub, viewEmpty = false;\n    const active = s.stages.find(x => x.id === s.tab);\n    if (s.tab === 'general') {\n      base = applyFilters(buildGeneral(published));\n      viewTitle = 'Classement général'; viewSub = published.length + ' étapes · 3 meilleurs résultats';\n    } else if (active.published) {\n      base = applyFilters([...active.results].sort((a, b) => Number(b.points) - Number(a.points)));\n      viewTitle = active.name; viewSub = active.date;\n    } else {\n      base = []; viewEmpty = true; viewTitle = active.name; viewSub = active.date + ' · à venir';\n    }\n\n    // progression au général\n    let prevRank = null;\n    if (s.tab === 'general' && published.length >= 2) {\n      const order = id => s.stages.findIndex(x => x.id === id);\n      const latest = published.slice().sort((a, b) => order(b.id) - order(a.id))[0];\n      const prevList = applyFilters(buildGeneral(published.filter(x => x.id !== latest.id)));\n      prevRank = {};\n      prevList.forEach((p, i) => { prevRank[p.name] = i; });\n    }\n    const moveOf = (name, i) => {\n      if (!prevRank) return { show: false };\n      const prev = prevRank[name];\n      if (prev === undefined) return { show: true, text: '★', color: '#E8B441' };\n      const d = prev - i;\n      if (d > 0) return { show: true, text: '▲' + d, color: '#2FB573' };\n      if (d < 0) return { show: true, text: '▼' + (-d), color: '#E0604E' };\n      return { show: true, text: '=', color: '#9AA39B' };\n    };\n\n    const deco = (r, i) => {\n      const mv = moveOf(r.name, i);\n      return {\n        name: r.name, cat: r.cat, points: r.points, pos: i + 1,\n        color: this.catColor(r.cat), initials: this.initials(r.name),\n        showIndex, indexText: 'index ' + (r.index || '—'),\n        showMove: mv.show, moveText: mv.text, moveColor: mv.color\n      };\n    };\n    const ranking = base.map(deco);\n\n    const tabDefs = [{ id: 'general', label: '🏆 Général', dot: false }]\n      .concat(s.stages.map(st => ({ id: st.id, label: 'Ét.' + st.n, dot: !st.published })));\n    const tabs = tabDefs.map(t => {\n      const on = t.id === s.tab;\n      let style;\n      if (t.id === 'general') {\n        style = 'flex:none; padding:8px 17px; border:none; border-radius:100px; cursor:pointer; font-size:13px; font-weight:800; white-space:nowrap; background:' +\n          (on ? '#E8B441' : 'rgba(232,180,65,.22)') + '; color:' + (on ? '#3A2A05' : '#FFD56B') +\n          '; box-shadow:' + (on ? '0 3px 10px rgba(232,180,65,.45)' : 'none') + ';';\n      } else {\n        style = 'flex:none; padding:8px 15px; border:none; border-radius:100px; cursor:pointer; font-size:13px; font-weight:' +\n          (on ? '700' : '600') + '; white-space:nowrap; background:' + (on ? '#fff' : 'rgba(255,255,255,.13)') +\n          '; color:' + (on ? '#1E6B45' : '#CDEBDB') + ';';\n      }\n      return { label: t.label, dot: t.dot, select: () => this.setState({ tab: t.id }), style };\n    });\n\n    const next = s.stages.find(x => !x.published);\n\n    return {\n      tabs,\n      viewTitle, viewSub, viewEmpty,\n      hasRanking: !viewEmpty && ranking.length > 0,\n      noPlayers: !viewEmpty && ranking.length === 0,\n      podium: { first: ranking[0], second: ranking[1], third: ranking[2] },\n      rest: ranking.slice(3),\n\n      setFilles: () => this.setState({ gender: 'F' }),\n      setGarcons: () => this.setState({ gender: 'G' }),\n      fillesStyle: 'flex:1; padding:9px; border:none; border-radius:100px; cursor:pointer; font-size:13px; font-weight:700; background:' + (s.gender === 'F' ? '#fff' : 'transparent') + '; color:' + (s.gender === 'F' ? '#1E6B45' : '#CDEBDB') + ';',\n      garconsStyle: 'flex:1; padding:9px; border:none; border-radius:100px; cursor:pointer; font-size:13px; font-weight:700; background:' + (s.gender === 'G' ? '#fff' : 'transparent') + '; color:' + (s.gender === 'G' ? '#1E6B45' : '#CDEBDB') + ';',\n\n      showNext: !!next,\n      nextName: next ? next.name : '',\n      nextDate: next ? next.date : ''\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
